/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.1.1'
    implementation 'org.mariadb.jdbc:mariadb-java-client:3.3.2'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc:3.1.1'
    implementation 'org.springframework.boot:spring-boot-starter-web:3.1.1'
    implementation 'org.projectlombok:lombok:1.18.28'
    // Dependency 1
    implementation 'org.apache.commons:commons-lang3:3.12.0'

    // Dependency 2
    testImplementation 'junit:junit:4.13.1'

    // Dependency 3
    implementation 'com.google.guava:guava:30.1-jre'

    // Dependency 4
    implementation 'org.slf4j:slf4j-api:1.7.32'

    // Dependency 5
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.13.0'

    // Dependency 6
    implementation 'org.springframework:spring-core:5.3.14'


    // Dependency 8
    implementation 'org.hibernate:hibernate-core:5.5.7.Final'

    // Dependency 9
    implementation 'org.apache.httpcomponents:httpclient:4.5.13'

    // Dependency 10
    implementation 'org.apache.poi:poi:5.2.3'
    runtimeOnly 'com.h2database:h2:2.1.214'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.1.1'
    compileOnly 'org.springframework.boot:spring-boot-starter-tomcat:3.1.1'
}

group = 'com.backend'
version = '0.0.1-SNAPSHOT'
description = 'artgallerybackend'
java.sourceCompatibility = JavaVersion.VERSION_11

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
